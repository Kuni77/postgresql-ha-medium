# Architecture HA PostgreSQL - 3 noeuds (prod1, prod2, dr)
# Simule 3 serveurs avec chacun : etcd + Patroni/PostgreSQL

services:

  # ETCD CLUSTER - 3 noeuds (quorum = 2)

  etcd1:
    image: quay.io/coreos/etcd:v3.5.9
    container_name: demo-etcd1
    hostname: etcd1
    environment:
      ETCD_NAME: etcd1
      ETCD_DATA_DIR: /etcd-data
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd1:2379
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd1:2380
      ETCD_INITIAL_CLUSTER: etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCD_INITIAL_CLUSTER_TOKEN: demo-etcd-cluster
    ports:
      - "2379:2379"
    networks:
      - ha-network
    volumes:
      - etcd1-data:/etcd-data
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  etcd2:
    image: quay.io/coreos/etcd:v3.5.9
    container_name: demo-etcd2
    hostname: etcd2
    environment:
      ETCD_NAME: etcd2
      ETCD_DATA_DIR: /etcd-data
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd2:2379
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd2:2380
      ETCD_INITIAL_CLUSTER: etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCD_INITIAL_CLUSTER_TOKEN: demo-etcd-cluster
    ports:
      - "2381:2379"
    networks:
      - ha-network
    volumes:
      - etcd2-data:/etcd-data
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  etcd3:
    image: quay.io/coreos/etcd:v3.5.9
    container_name: demo-etcd3
    hostname: etcd3
    environment:
      ETCD_NAME: etcd3
      ETCD_DATA_DIR: /etcd-data
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd3:2379
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd3:2380
      ETCD_INITIAL_CLUSTER: etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCD_INITIAL_CLUSTER_TOKEN: demo-etcd-cluster
    ports:
      - "2382:2379"
    networks:
      - ha-network
    volumes:
      - etcd3-data:/etcd-data
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PATRONI + PostgreSQL - 3 noeuds

  # --- PROD1 (Primary initial) ---
  patroni-prod1:
    image: postgres:15-alpine
    container_name: demo-patroni-prod1
    hostname: patroni-prod1
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_password
    ports:
      - "5401:5432"
      - "8001:8008"
    networks:
      - ha-network
    volumes:
      - prod1-data:/home/postgres/data
      - ./config/patroni-prod1.yml:/etc/patroni.yml:ro
      - ./config/entrypoint-patroni.sh:/entrypoint-patroni.sh:ro
    depends_on:
      etcd1:
        condition: service_healthy
      etcd2:
        condition: service_healthy
      etcd3:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/entrypoint-patroni.sh"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- PROD2 (Replica synchrone) ---
  patroni-prod2:
    image: postgres:15-alpine
    container_name: demo-patroni-prod2
    hostname: patroni-prod2
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_password
    ports:
      - "5402:5432"
      - "8002:8008"
    networks:
      - ha-network
    volumes:
      - prod2-data:/home/postgres/data
      - ./config/patroni-prod2.yml:/etc/patroni.yml:ro
      - ./config/entrypoint-patroni.sh:/entrypoint-patroni.sh:ro
    depends_on:
      etcd1:
        condition: service_healthy
      etcd2:
        condition: service_healthy
      etcd3:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/entrypoint-patroni.sh"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- DR (Disaster Recovery - Replica asynchrone) ---
  patroni-dr:
    image: postgres:15-alpine
    container_name: demo-patroni-dr
    hostname: patroni-dr
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_password
    ports:
      - "5403:5432"
      - "8003:8008"
    networks:
      - ha-network
    volumes:
      - dr-data:/home/postgres/data
      - ./config/patroni-dr.yml:/etc/patroni.yml:ro
      - ./config/entrypoint-patroni.sh:/entrypoint-patroni.sh:ro
    depends_on:
      etcd1:
        condition: service_healthy
      etcd2:
        condition: service_healthy
      etcd3:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/entrypoint-patroni.sh"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # HAProxy - Load Balancer
  haproxy:
    image: haproxy:2.8-alpine
    container_name: demo-haproxy
    ports:
      - "5000:5000"    # PostgreSQL écriture (vers primary)
      - "5001:5001"    # PostgreSQL lecture (vers replicas)
      - "7000:7000"    # Dashboard stats
    networks:
      - ha-network
    volumes:
      - ./config/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - patroni-prod1
      - patroni-prod2
      - patroni-dr
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:7000"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  ha-network:
    driver: bridge

volumes:
  etcd1-data:
  etcd2-data:
  etcd3-data:
  prod1-data:
  prod2-data:
  dr-data:
